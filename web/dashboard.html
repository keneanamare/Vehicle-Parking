<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="dashboard">

        <h1>
            PARKING MANAGEMENT DASHBOARD
        </h1>

        <div class="status-bar">

            <span>
                SYSTEM STATUS : ONLINE
            </span>

            <span>
                SECURITY : ACTIVE
            </span>

        </div>
        <div class="clock" id="clock">
            00:00:00
        </div>

        <div class="cards">

            <div class="dashboard-card">

                <h2>Total Slots</h2>

                <p>30</p>

            </div>

            <div class="dashboard-card">

                <h2>Available</h2>

                <p>18</p>

            </div>

            <div class="dashboard-card">

                <h2>Occupied</h2>

                <p>12</p>

            </div>

            <div class="dashboard-card">

                <h2>Revenue</h2>

                <p>1200 Birr</p>

            </div>

        </div>

        <h2 class="section-title">
            LIVE PARKING SLOTS
        </h2>

        <div class="slots">

            <div class="slot free">
                A1
            </div>

            <div class="slot occupied">
                A2
            </div>

            <div class="slot free">
                A3
            </div>

            <div class="slot occupied">
                A4
            </div>

            <div class="slot free">
                B1
            </div>

            <div class="slot occupied">
                B2
            </div>

        </div>

        <button onclick="showTicket()">
            Generate Demo Ticket
        </button>

        <div class="popup" id="ticketPopup">

            <div class="popup-content">

                <h2>
                    PARKING TICKET
                </h2>

                <p>Ticket ID : 1001</p>

                <p>Vehicle : Car</p>

                <p>Slot : A2</p>

                <p>Status : ACTIVE</p>

                <button onclick="closeTicket()">
                    Close
                </button>

            </div>

        </div>

    </div>

</body>
</html>
